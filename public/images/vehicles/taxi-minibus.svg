<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 72" width="150" height="72">
  <defs>
    <linearGradient id="tBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E0"/>
      <stop offset="40%" stop-color="#E8DFC8"/>
      <stop offset="100%" stop-color="#C8B898"/>
    </linearGradient>
    <linearGradient id="tRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF6EE"/>
      <stop offset="100%" stop-color="#E8DFC8"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="tGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A6FA5"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <radialGradient id="tWheel" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="50%" stop-color="#333"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <filter id="tShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Shadow -->
  <ellipse cx="72" cy="66" rx="58" ry="4" fill="rgba(0,0,0,0.15)"/>
  <!-- Body -->
  <rect x="6" y="20" width="138" height="40" rx="20" fill="url(#tBody)" filter="url(#tShadow)"/>
  <!-- Blue stripe -->
  <rect x="6" y="36" width="138" height="10" fill="url(#stripe)" opacity="0.9"/>
  <!-- Roof sign -->
  <rect x="62" y="4" width="26" height="10" rx="4" fill="#FBBF24" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <text x="75" y="11.5" text-anchor="middle" font-size="6" font-weight="800" fill="#1A1A1A" font-family="Arial,sans-serif">4+1</text>
  <!-- Roof -->
  <rect x="30" y="10" width="90" height="30" rx="14" fill="url(#tRoof)"/>
  <!-- Windshield -->
  <rect x="108" y="16" width="28" height="22" rx="8" fill="url(#tGlass)" opacity="0.9"/>
  <!-- Side windows -->
  <rect x="46" y="16" width="18" height="22" rx="4" fill="url(#tGlass)" opacity="0.8"/>
  <rect x="68" y="16" width="18" height="22" rx="4" fill="url(#tGlass)" opacity="0.8"/>
  <rect x="90" y="16" width="14" height="22" rx="4" fill="url(#tGlass)" opacity="0.7"/>
  <!-- Rear window -->
  <rect x="14" y="16" width="14" height="22" rx="4" fill="url(#tGlass)" opacity="0.6"/>
  <!-- Tail lights -->
  <rect x="8" y="30" width="5" height="12" rx="2" fill="#EF4444" opacity="0.9"/>
  <!-- Headlights -->
  <rect x="140" y="28" width="5" height="9" rx="2" fill="#FDE68A" opacity="0.9"/>
  <rect x="140" y="40" width="5" height="9" rx="2" fill="#FDE68A" opacity="0.9"/>
  <!-- Front wheels -->
  <circle cx="115" cy="56" r="10" fill="url(#tWheel)"/>
  <circle cx="115" cy="56" r="4" fill="#444"/>
  <!-- Rear wheels -->
  <circle cx="35" cy="56" r="10" fill="url(#tWheel)"/>
  <circle cx="35" cy="56" r="4" fill="#444"/>
  <!-- Side mirrors -->
  <rect x="112" y="18" width="3" height="5" rx="1" fill="#999"/>
  <rect x="36" y="18" width="3" height="5" rx="1" fill="#999"/>
</svg>
